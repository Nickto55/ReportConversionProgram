<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .logo-section {
            padding: 0;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            display: flex; /* Включаем flex-контейнер */
            align-items: center; /* Центрируем по вертикали */
            justify-content: center; /* Центрируем по горизонтали */
            box-shadow: 0 20px 60px rgba(37, 99, 235, 0.4);
        }

        .logo-section img {
            width: 80px;
            height: 80px;
            object-fit: contain; /* Защитит картинку от деформации */
        }

        .logo-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(37, 99, 235, 0.4);
            animation: logoPulse 2s ease-in-out infinite;
        }

        .logo svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(37, 99, 235, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 25px 70px rgba(37, 99, 235, 0.6); }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .progress-container {
            width: 280px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            border-radius: 2px;
            animation: progressLoad 3s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 95%; }
        }

        .status-text {
            margin-top: 16px;
            font-size: 12px;
            color: #64748b;
            font-family: 'SF Mono', monospace;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        .version {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #475569;
        }

        /* Уменьшенная версия для маленького окна */
        .compact .logo-container {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        .compact .logo {
            border-radius: 16px;
        }

        .compact .logo svg {
            width: 40px;
            height: 40px;
        }

        .compact .title {
            font-size: 20px;
        }

        .compact .subtitle {
            font-size: 12px;
            margin-bottom: 24px;
        }

        .compact .progress-container {
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-section">
                <img src="icons/png/new_icon_report-conversion-program.png">
        </div>
        <!--<div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
                <polyline points="14 2 14 8 20 8" fill="none" stroke="white" stroke-width="1.5"/>
                <line x1="16" y1="13" x2="8" y2="13" stroke="white" stroke-width="1.5" opacity="0.6"/>
                <line x1="16" y1="17" x2="8" y2="17" stroke="white" stroke-width="1.5" opacity="0.6"/>
                <line x1="10" y1="9" x2="8" y2="9" stroke="white" stroke-width="1.5" opacity="0.6"/>
            </svg>
        </div> -->
    </div>

    <div class="title">Good Morning</div>
    <div class="subtitle">Report Conversion Program</div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status-text">
        <span id="statusText">Инициализация</span><span class="dots"></span>
    </div>

    <div class="version" id="versionText">v2.0.1</div>

    <script>
        // Статусы загрузки
        const statuses = [
            'Инициализация',
            'Загрузка конфигурации',
            'Проверка данных',
            'Подготовка интерфейса',
            'Запуск программы'
        ];

        let currentStatus = 0;
        const statusEl = document.getElementById('statusText');
        const progressEl = document.getElementById('progressBar');

        // Меняем статусы
        const statusInterval = setInterval(() => {
            currentStatus++;
            if (currentStatus < statuses.length) {
                statusEl.textContent = statuses[currentStatus];
            }
            if (currentStatus >= statuses.length - 1) {
                clearInterval(statusInterval);
            }
        }, 600);

        // Проверяем готовность API
        function checkReady() {
            if (window.pywebview && window.pywebview.api) {
                // API готов — ускоряем прогресс до конца
                progressEl.style.animation = 'none';
                progressEl.style.width = '100%';
                progressEl.style.transition = 'width 0.3s ease';
                statusEl.textContent = 'Готово';
                return true;
            }
            return false;
        }

        // Пробуем сразу
        if (!checkReady()) {
            // Если не готов — проверяем каждые 100мс
            const checkInterval = setInterval(() => {
                if (checkReady()) {
                    clearInterval(checkInterval);
                }
            }, 100);
        }

        // Получаем версию из Python если доступно
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.load_settings().then(config => {
                if (config.title) {
                    document.querySelector('.title').textContent = config.title;
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
